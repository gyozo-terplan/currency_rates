bundle:
  name: mnb-fx-pipeline

variables:
  catalog_name:
    description: "Cél Unity Catalog"
    default: dev_mnb_catalog
  schema_name:
    description: "Adatbázis séma"
    default: mnb_data
  warehouse_id:
    description: "SQL Warehouse ID a Gold réteghez"
    default: your_warehouse_id_here
  notification_emails:
    description: "E-mail értesítések hiba esetén"

targets:
  dev:
    workspace:
      host: https://adb-xxx-dev.azuredatabricks.net
    variables:
      catalog_name: dev_mnb_catalog
      schema_name: mnb_sandbox
  prod:
    workspace:
      host: https://adb-xxx-prod.azuredatabricks.net
    variables:
      catalog_name: prod_mnb_catalog
      schema_name: mnb_production

resources:
  jobs:
    mnb_daily_pipeline:
      name: MNB_Medallion_ETL
      schedule:
        quartz_cron_expression: "0 0 7 * * ?" # Reggel 7-kor
        timezone_id: Europe/Budapest
      
      tasks:
        - task_key: python_bronze_silver
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1
          notebook_task:
            notebook_path: ./src/main.py
            base_parameters:
              p_catalog: ${var.catalog_name}
              p_schema: ${var.schema_name}

        - task_key: sql_gold
          depends_on:
            - task_key: python_bronze_silver
          sql_task:
            file: ./resources/gold_views.sql
            warehouse_id: ${var.warehouse_id}
            parameters:
              catalog: ${var.catalog_name}
              schema: ${var.schema_name}

      email_notifications:
        on_failure: ${var.notification_emails}